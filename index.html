<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Cost Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 32px; font-weight: 600; margin-bottom: 0.5rem; }
        .header p { font-size: 14px; color: #666; }
        .setup { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
        .setup label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .setup input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 1rem; font-size: 13px; }
        .setup button { background: #1f2937; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; }
        .setup button:hover { background: #111827; }
        .error { padding: 1rem; color: #d32f2f; background: #ffebee; border-radius: 8px; margin-bottom: 1rem; }
        .loading { text-align: center; padding: 2rem; color: #666; }
        .hidden { display: none; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
        .metric { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; }
        .metric-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .metric-value { font-size: 24px; font-weight: 600; }
        
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.5rem; }
        .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
        .chart-container { height: 300px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; border-bottom: 1px solid #e0e0e0; }
        td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Booking Cost Dashboard</h1>
            <p>Real-time data from Google Sheets</p>
        </div>
        
        <div id="setup-section" class="setup">
            <label>Paste your Google API Key:</label>
            <input type="text" id="api-key" placeholder="AIza...">
            <button onclick="loadData()">Load Dashboard</button>
            <p style="font-size: 12px; color: #666; margin-top: 1rem;">
                ℹ️ Don't have an API key? <a href="https://console.cloud.google.com" target="_blank">Get one here</a>
            </p>
        </div>
        
        <div id="error" class="error hidden"></div>
        <div id="loading" class="loading hidden">Loading data...</div>
        
        <div id="dashboard" class="hidden">
            <div class="metrics-grid">
                <div class="metric">
                    <div class="metric-label">Total Booking</div>
                    <div class="metric-value" id="total-booking">$0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Design</div>
                    <div class="metric-value" id="total-design">$0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Install</div>
                    <div class="metric-value" id="total-install">$0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Cost</div>
                    <div class="metric-value" id="total-cost">$0</div>
                </div>
            </div>
            
            <div class="charts">
                <div class="chart-card">
                    <div class="chart-title">Cost Breakdown</div>
                    <div class="chart-container"><canvas id="pie-chart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Cost Comparison</div>
                    <div class="chart-container"><canvas id="bar-chart"></canvas></div>
                </div>
            </div>
            
            <div class="chart-card" style="margin-bottom: 2rem;">
                <div class="chart-title">Cost Trends</div>
                <div class="chart-container" style="height: 350px;"><canvas id="line-chart"></canvas></div>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">Detailed Data</div>
                <table id="data-table">
                    <thead>
                        <tr><th>Date</th><th>Booking</th><th>Design</th><th>Install</th><th>Total</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1Y6iwc9uI52vs5aTZa4c1c55b93J-h3qh5oQIKPJMkF0';
        const RANGE = 'Booking Data!A:E';
        let pieChart, barChart, lineChart;
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').classList.remove('hidden');
        }
        
        function formatCurrency(val) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        }
        
        async function loadData() {
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) { showError('Please enter your API Key'); return; }
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
            
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${apiKey}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if (!response.ok || result.error) {
                    throw new Error(result.error?.message || 'Failed to load data');
                }
                
                const rows = result.values || [];
                const data = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row[0]) {
                        data.push({
                            date: row[0],
                            booking: parseFloat(row[1]) || 0,
                            design: parseFloat(row[2]) || 0,
                            install: parseFloat(row[3]) || 0
                        });
                    }
                }
                
                displayDashboard(data);
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
        
        function displayDashboard(data) {
            const totals = data.reduce((a, r) => ({
                booking: a.booking + r.booking,
                design: a.design + r.design,
                install: a.install + r.install
            }), {booking: 0, design: 0, install: 0});
            
            const total = totals.booking + totals.design + totals.install;
            
            document.getElementById('total-booking').textContent = formatCurrency(totals.booking);
            document.getElementById('total-design').textContent = formatCurrency(totals.design);
            document.getElementById('total-install').textContent = formatCurrency(totals.install);
            document.getElementById('total-cost').textContent = formatCurrency(total);
            
            // Pie Chart
            const pieCtx = document.getElementById('pie-chart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Booking', 'Design', 'Install'],
                    datasets: [{
                        data: [totals.booking, totals.design, totals.install],
                        backgroundColor: ['#185FA5', '#1D9E75', '#D85A30']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            
            // Bar Chart
            const barCtx = document.getElementById('bar-chart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['Booking', 'Design', 'Install'],
                    datasets: [{
                        data: [totals.booking, totals.design, totals.install],
                        backgroundColor: ['#185FA5', '#1D9E75', '#D85A30']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
            });
            
            // Line Chart
            const lineCtx = document.getElementById('line-chart').getContext('2d');
            if (lineChart) lineChart.destroy();
            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [
                        { label: 'Booking', data: data.map(d => d.booking), borderColor: '#185FA5', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 2 },
                        { label: 'Design', data: data.map(d => d.design), borderColor: '#1D9E75', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 2 },
                        { label: 'Install', data: data.map(d => d.install), borderColor: '#D85A30', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            
            // Table
            const tbody = document.getElementById('data-table').querySelector('tbody');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td>${formatCurrency(r.booking)}</td>
                    <td>${formatCurrency(r.design)}</td>
                    <td>${formatCurrency(r.install)}</td>
                    <td>${formatCurrency(r.booking + r.design + r.install)}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
